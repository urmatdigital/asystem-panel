name: "ASYSTEM Multi-Agent Network"
description: "ASYSTEM AI Agent infrastructure — Tailscale mesh, PVE clusters, services"

settings:
  direction: TB
  theme: dark
  layout: hierarchical

subgraphs:
  - id: internet
    label: "🌐 Internet / Cloudflare"
  - id: csuite
    label: "🧠 C-Suite Agents"
  - id: directors
    label: "👔 Directors (PVE2 LXC)"
  - id: infra_hetzner
    label: "🖥️ Hetzner PVE1 (135.181.112.60)"
  - id: infra_pve2
    label: "⚡ PVE2 Cluster (77.235.20.172)"
  - id: services
    label: "🔧 Services"

nodes:
