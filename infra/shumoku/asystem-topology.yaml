    label: "Cloudflare"
    type: cloud
    vendor: cloudflare
    parent: internet
    ip: "cloudflare.com"
    description: "11 zones · 18 tunnels · CDN"

  - id: tailscale
    label: "Tailscale"
    type: cloud
    vendor: aws
    parent: internet
    description: "Mesh VPN · 30 nodes"

  # ── Mac Mini (Forge) ──
