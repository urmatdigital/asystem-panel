links:
  # Internet → Forge
  - from: {node: cloudflare}
    to: {node: hetzner_nginx}
    label: "CF Tunnel · HTTPS"
    bandwidth: 1G

  # Forge → Tailscale mesh
  - from: {node: forge}
    to: {node: tailscale}
    label: "Tailscale 100.87.107.50"
    bandwidth: 1G

  - from: {node: atlas}
    to: {node: tailscale}
    label: "100.68.144.79"
    bandwidth: 1G

  - from: {node: iron}
    to: {node: tailscale}
    label: "100.114.136.87"
    bandwidth: 1G

  - from: {node: mesa}
    to: {node: tailscale}
    label: "100.100.40.27"
    bandwidth: 1G

  # PVE2 agents → PVE2
  - from: {node: dana}
    to: {node: pve2}
    label: "LXC 501"
  - from: {node: nurlan}
    to: {node: pve2}
    label: "LXC 502"
  - from: {node: bekzat}
    to: {node: pve2}
    label: "LXC 503"
  - from: {node: ainura}
    to: {node: pve2}
    label: "LXC 504"
  - from: {node: marat}
    to: {node: pve2}
    label: "LXC 505"

  # PVE2 → Tailscale
  - from: {node: pve2}
    to: {node: tailscale}
    label: "Tailscale"
    bandwidth: 10G

  # Forge → Convex (API calls)
  - from: {node: forge}
    to: {node: convex}
    label: "HTTPS API"
    bandwidth: 1G

  # Atlas → Forge (proxy для OpenRouter)
  - from: {node: atlas}
    to: {node: forge}
    label: "HTTP CONNECT :8899"
    bandwidth: 1G

  # Hetzner → PVE1
  - from: {node: pve1}
    to: {node: tailscale}
    label: "Tailscale"
    bandwidth: 10G

  - from: {node: coolify}
    to: {node: pve1}
    label: "VM 100"

  - from: {node: hetzner_nginx}
    to: {node: pve1}
    label: "Same host"

  # SSO
  - from: {node: keycloak}
    to: {node: tailscale}
    label: "Tailscale"
    bandwidth: 1G

  - from: {node: hetzner_nginx}
    to: {node: keycloak}
    label: "sso.asystem.kg"
